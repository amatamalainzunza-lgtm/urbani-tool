<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urbani · Calificador de Prospecto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222222;
    --border: #2e2e2e;
    --border2: #3a3a3a;
    --text: #f0ede8;
    --text2: #999;
    --text3: #555;
    --accent: #c9a96e;
    --accent2: #a07c42;
    --green: #4caf82;
    --yellow: #e8b84b;
    --red: #e05c5c;
    --blue: #5b9bd5;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .logo span { color: var(--text2); font-weight: 400; }

  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text3);
    display: inline-block;
    margin-right: 6px;
    transition: background 0.3s;
  }
  #status-dot.ok { background: var(--green); }
  #status-dot.err { background: var(--red); }

  #status-text { font-size: 12px; color: var(--text2); }

  .main { display: flex; height: calc(100vh - 57px); }

  /* SIDEBAR */
  .sidebar {
    width: 320px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 10px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }

  label {
    font-size: 12px;
    color: var(--text2);
    font-weight: 500;
  }

  .required-star { color: var(--accent); margin-left: 2px; }

  input, select {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }

  .input-prefix {
    position: relative;
  }
  .input-prefix span {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 12px;
    pointer-events: none;
  }
  .input-prefix input { padding-left: 24px; }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn-calc {
    background: var(--accent);
    color: #1a1200;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.04em;
    transition: background 0.2s, opacity 0.2s;
    margin-top: 4px;
  }
  .btn-calc:hover { background: #dbbe88; }
  .btn-calc:disabled { opacity: 0.4; cursor: default; }

  .btn-reset {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-reset:hover { color: var(--text2); border-color: var(--border2); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
  }

  .config-toggle {
    background: none;
    border: none;
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0;
  }
  .config-toggle:hover { color: var(--text2); }
  .config-panel { display: none; margin-top: 10px; }
  .config-panel.open { display: block; }

  /* RESULTS AREA */
  .results {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    text-align: center;
    gap: 8px;
  }
  .empty-state .icon { font-size: 36px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* CARDS FINANCIERAS */
  .finance-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .f-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
  }
  .f-card .f-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
  .f-card .f-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
  }
  .f-card .f-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ALERTAS */
  .alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  .alert {
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border: 1px solid;
  }
  .alert.red { background: rgba(224,92,92,0.08); border-color: rgba(224,92,92,0.25); color: #f09090; }
  .alert.yellow { background: rgba(232,184,75,0.08); border-color: rgba(232,184,75,0.25); color: #f0cc80; }
  .alert.green { background: rgba(76,175,130,0.08); border-color: rgba(76,175,130,0.25); color: #7dd4a8; }
  .alert-icon { font-size: 15px; margin-top: 1px; flex-shrink: 0; }
  .alert strong { display: block; margin-bottom: 2px; }

  /* RESULTADOS */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .results-header h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
  }
  .results-count {
    font-size: 12px;
    color: var(--text3);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  /* FILTROS */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .filters select {
    width: auto;
    font-size: 12px;
    padding: 6px 10px;
    color: var(--text2);
  }

  /* PROYECTO GROUP */
  .proyecto-group {
    margin-bottom: 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .proyecto-header {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .proyecto-header:hover { background: var(--surface2); }

  .proyecto-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .proyecto-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }
  .proyecto-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .proyecto-count {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    background: rgba(201,169,110,0.1);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .chevron {
    color: var(--text3);
    font-size: 12px;
    transition: transform 0.2s;
  }
  .chevron.open { transform: rotate(180deg); }

  .proyecto-body { display: none; }
  .proyecto-body.open { display: block; }

  /* TIPOLOGIA ROW */
  .tipo-row {
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .tipo-row:hover { background: rgba(255,255,255,0.02); }

  .tipo-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 4px;
    min-width: 72px;
    text-align: center;
    flex-shrink: 0;
  }

  .tipo-info { flex: 1; }
  .tipo-precio {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
  }
  .tipo-precio-sub { font-size: 11px; color: var(--text3); }
  .tipo-count { font-size: 12px; color: var(--text3); text-align: right; }

  .bono-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    background: rgba(232,184,75,0.12);
    color: var(--yellow);
    border: 1px solid rgba(232,184,75,0.3);
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 5px;
    vertical-align: middle;
    white-space: nowrap;
  }

  /* UNIDADES DETALLE */
  .unidades-table {
    display: none;
    background: #111;
    border-top: 1px solid var(--border);
  }
  .unidades-table.open { display: block; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th {
    text-align: left;
    padding: 8px 14px;
    color: var(--text3);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    font-weight: 500;
  }
  td {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }

  .td-mono {
    font-family: 'DM Mono', monospace;
    color: var(--text);
  }
  .td-desc { color: var(--accent); font-weight: 500; }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text3);
    font-size: 13px;
    gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  @media (max-width: 700px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
    .results { padding: 16px; }
    .finance-cards { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Urbani <span>/ Calificador</span></div>
  <div>
    <span id="status-dot"></span>
    <span id="status-text">Conectando...</span>
  </div>
</header>

<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div>
      <div class="section-title">Financiero</div>

      <div class="field">
        <label>Renta líquida mensual <span class="required-star">*</span></label>
        <div class="input-prefix">
          <span>$</span>
          <input type="text" id="inp-renta" placeholder="1.800.000" inputmode="numeric">
        </div>
      </div>

      <div class="field">
        <label>Pie disponible <span class="required-star">*</span></label>
        <div class="input-prefix">
          <span>$</span>
          <input type="text" id="inp-pie" placeholder="8.000.000" inputmode="numeric">
        </div>
      </div>

      <div class="field">
        <label>Plazo del crédito</label>
        <select id="inp-plazo">
          <option value="20">20 años</option>
          <option value="25">25 años</option>
          <option value="30" selected>30 años</option>
        </select>
      </div>

      <div class="field">
        <label>Bono pie del proyecto (%)</label>
        <input type="number" id="inp-bono" min="0" max="10" step="0.5" value="0" placeholder="0">
      </div>
    </div>

    <hr class="divider">

    <div>
      <div class="section-title">Perfil crediticio</div>

      <div class="field">
        <label>Tipo de contrato</label>
        <select id="inp-contrato">
          <option value="">Sin especificar</option>
          <option value="indefinido">Indefinido</option>
          <option value="plazo">Plazo fijo</option>
          <option value="honorarios">Honorarios</option>
        </select>
      </div>

      <div class="field">
        <label>Antigüedad laboral</label>
        <select id="inp-antiguedad">
          <option value="">Sin especificar</option>
          <option value="0">Menos de 3 meses</option>
          <option value="3">3 a 6 meses</option>
          <option value="6">6 a 12 meses</option>
          <option value="12">Más de 12 meses</option>
        </select>
      </div>

      <div class="field">
        <label>¿Tiene deudas activas?</label>
        <select id="inp-deudas">
          <option value="">Sin especificar</option>
          <option value="no">No</option>
          <option value="si">Sí</option>
        </select>
      </div>
    </div>

    <hr class="divider">

    <div>
      <div class="section-title">Preferencias</div>

      <div class="field">
        <label>Proyecto</label>
        <select id="inp-proyecto">
          <option value="">Todos</option>
        </select>
      </div>

      <div class="row-2">
        <div class="field">
          <label>Tipología</label>
          <select id="inp-tipologia">
            <option value="">Todas</option>
            <option value="0">Estudio</option>
            <option value="1">1 dormitorio</option>
            <option value="2">2 dormitorios</option>
            <option value="3">3 dormitorios</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo inmueble</label>
          <select id="inp-tipo">
            <option value="">Todos</option>
            <option value="DEPARTAMENTO">Depto</option>
            <option value="CASA">Casa</option>
            <option value="TOWNHOUSE">Townhouse</option>
          </select>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div>
      <button class="btn-calc" id="btn-calc" onclick="calcular()">Calificar prospecto</button>
      <br><br>
      <button class="btn-reset" onclick="resetear()">Limpiar</button>
    </div>

    <div>
      <button class="config-toggle" onclick="toggleConfig()">
        ⚙ Parámetros financieros
      </button>
      <div class="config-panel" id="config-panel">
        <div class="field" style="margin-top:10px">
          <label>Tasa anual (%)</label>
          <input type="number" id="cfg-tasa" step="0.01" placeholder="3.88">
        </div>
        <div class="field">
          <label>Valor UF ($)</label>
          <input type="number" id="cfg-uf" placeholder="39947">
        </div>
        <div class="row-2">
          <div class="field">
            <label>LTV (%)</label>
            <input type="number" id="cfg-ltv" step="1" placeholder="80">
          </div>
          <div class="field">
            <label>% dividendo</label>
            <input type="number" id="cfg-div" step="1" placeholder="25">
          </div>
        </div>
      </div>
    </div>

  </aside>

  <!-- RESULTS -->
  <main class="results" id="results-area">
    <div class="empty-state">
      <div class="icon">⌂</div>
      <p>Ingresa renta y pie para comenzar</p>
    </div>
  </main>

</div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────
// ⚠ REEMPLAZA ESTA URL CON LA TUYA (la que termina en /exec)
const API_URL = "https://script.google.com/macros/s/AKfycbwVpQTDrRccagNsAkXAo9nkWKTw73-HM-L9p3DlHRnq-WMLUYM_IxEsoSXuVuM2Z5Ga/exec";

// ─── ESTADO ───────────────────────────────────────────────────
let stockData = [];
let configData = {};
let proyectos = [];

// ─── INICIALIZACIÓN ───────────────────────────────────────────
window.onload = async () => {
  setStatus("Cargando datos...", "");
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    stockData = data.stock || [];
    configData = data.config || {};

    // Llenar config UI
    if (configData.tasa_anual) document.getElementById("cfg-tasa").value = (configData.tasa_anual * 100).toFixed(2);
    if (configData.valor_uf)   document.getElementById("cfg-uf").value   = configData.valor_uf;
    if (configData.ltv)        document.getElementById("cfg-ltv").value  = (configData.ltv * 100).toFixed(0);
    if (configData.pct_dividendo) document.getElementById("cfg-div").value = (configData.pct_dividendo * 100).toFixed(0);

    // Llenar selector de proyectos
    proyectos = [...new Set(stockData.map(u => u.proyecto))].sort();
    const sel = document.getElementById("inp-proyecto");
    proyectos.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p; opt.textContent = p;
      sel.appendChild(opt);
    });

    setStatus(`${stockData.length} unidades disponibles`, "ok");
  } catch (e) {
    setStatus("Error al conectar con Sheets", "err");
    console.error(e);
  }
};

// ─── HELPERS ──────────────────────────────────────────────────
function setStatus(txt, cls) {
  document.getElementById("status-text").textContent = txt;
  const dot = document.getElementById("status-dot");
  dot.className = cls;
}

function parseMonto(str) {
  return parseFloat(str.toString().replace(/\./g, "").replace(",", ".")) || 0;
}

function fmtCLP(n) {
  return "$" + Math.round(n).toLocaleString("es-CL");
}

function fmtUF(n) {
  return "UF " + n.toFixed(1);
}

function getConfig() {
  const tasa   = (parseFloat(document.getElementById("cfg-tasa").value) || configData.tasa_anual * 100) / 100;
  const ufVal  = parseFloat(document.getElementById("cfg-uf").value)  || configData.valor_uf  || 39947;
  const ltv    = (parseFloat(document.getElementById("cfg-ltv").value) || (configData.ltv * 100) || 80) / 100;
  const pctDiv = (parseFloat(document.getElementById("cfg-div").value) || (configData.pct_dividendo * 100) || 25) / 100;
  return { tasa, ufVal, ltv, pctDiv };
}

function calcFactorCuota(tasa, anos) {
  const r = tasa / 12;
  const n = anos * 12;
  return (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}

function formatInputCLP(id) {
  const el = document.getElementById(id);
  el.addEventListener("input", () => {
    const raw = el.value.replace(/\D/g, "");
    if (raw) el.value = parseInt(raw).toLocaleString("es-CL");
    else el.value = "";
  });
}

formatInputCLP("inp-renta");
formatInputCLP("inp-pie");

function toggleConfig() {
  document.getElementById("config-panel").classList.toggle("open");
}

function resetear() {
  ["inp-renta","inp-pie","inp-bono","inp-contrato","inp-antiguedad","inp-deudas","inp-proyecto","inp-tipologia","inp-tipo"].forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === "SELECT") el.selectedIndex = 0;
    else el.value = id === "inp-bono" ? "0" : "";
  });
  document.getElementById("results-area").innerHTML = `
    <div class="empty-state">
      <div class="icon">⌂</div>
      <p>Ingresa renta y pie para comenzar</p>
    </div>`;
}

// ─── CÁLCULO PRINCIPAL ────────────────────────────────────────
function calcular() {
  const rentaStr = document.getElementById("inp-renta").value.trim();
  const pieStr   = document.getElementById("inp-pie").value.trim();
  const rentaCLP = parseMonto(rentaStr);
  const pieCLP   = parseMonto(pieStr);
  const plazo    = parseInt(document.getElementById("inp-plazo").value);
  const contrato = document.getElementById("inp-contrato").value;
  const antig    = document.getElementById("inp-antiguedad").value;
  const deudas   = document.getElementById("inp-deudas").value;
  const proyFilt = document.getElementById("inp-proyecto").value;
  const dormFilt = document.getElementById("inp-tipologia").value;
  const tipoFilt = document.getElementById("inp-tipo").value;

  const area = document.getElementById("results-area");

  if (!rentaStr || pieStr === "") {
    area.innerHTML = `<div class="alerts"><div class="alert red"><span class="alert-icon">⚠</span><div><strong>Faltan datos obligatorios</strong>Ingresa renta líquida y pie disponible para continuar.</div></div></div>`;
    return;
  }

  const { tasa, ufVal, ltv, pctDiv } = getConfig();
  const factor = calcFactorCuota(tasa, plazo);
  const bonoPct = Math.min(Math.max(parseFloat(document.getElementById("inp-bono").value) || 0, 0), 1 - ltv - 0.01) / 100;

  const divMaxCLP = rentaCLP * pctDiv;
  const divMaxUF  = divMaxCLP / ufVal;
  const creditoMaxUF = divMaxUF / factor;
  const propMaxByIngreso = creditoMaxUF / ltv;
  const propMaxByPie = pieCLP / ((1 - ltv) * ufVal);
  const presupuesto = Math.min(propMaxByIngreso, propMaxByPie);
  const pieNecesario = presupuesto * (1 - ltv) * ufVal;
  const rentaNecesaria = factor * (presupuesto * ltv) * ufVal / pctDiv;

  // ── Presupuesto con bono pie ──
  let presupuesto_bono = 0;
  let propMaxByIngreso_bono = 0;
  let propMaxByPie_bono = 0;
  if (bonoPct > 0) {
    const ltvBono   = ltv + bonoPct;
    const piePctBono = 1 - ltvBono;                               // pie requerido como % del precio
    propMaxByIngreso_bono = divMaxUF / (ltvBono * factor);        // ingreso soporta dividendo mayor
    propMaxByPie_bono     = piePctBono > 0 ? (pieCLP / ufVal) / piePctBono : 0;
    presupuesto_bono = Math.min(propMaxByIngreso_bono, propMaxByPie_bono);
  }

  // ── Alertas de perfil crediticio ──
  const alertas = [];
  let bloqueado = false;

  if (contrato === "honorarios") {
    const meses = antig === "" ? null : parseInt(antig);
    if (meses === null || meses < 12) {
      const faltan = meses === null ? "varios meses" : (meses < 3 ? "al menos 9 meses más" : meses < 6 ? "al menos 6 meses más" : "al menos 3 meses más");
      alertas.push({ tipo: "red", titulo: "Boletas insuficientes", msg: `El banco requiere mínimo 12 meses de boletas continuas. Debe esperar ${faltan} antes de aplicar.` });
      bloqueado = true;
    }
  }

  if (contrato === "plazo") {
    const meses = antig === "" ? null : parseInt(antig);
    if (meses !== null && meses < 6) {
      const faltan = meses < 3 ? "3 a 6 meses" : "algunos meses";
      alertas.push({ tipo: "red", titulo: "Antigüedad insuficiente", msg: `Con contrato a plazo fijo se requieren al menos 6 meses de antigüedad. Esperar ${faltan} más, o conseguir contrato indefinido.` });
      bloqueado = true;
    }
  }

  if (!bloqueado) {
    if (presupuesto < 1150) {
      const unitMin = stockData.length > 0 ? Math.min(...stockData.map(u => u.valorLista).filter(v => v > 0)) : 1150;
      const rentaExtra = Math.ceil(rentaNecesaria * 1.1 - rentaCLP);
      alertas.push({ tipo: "yellow", titulo: "Renta insuficiente", msg: `La renta actual no alcanza para ninguna unidad del portafolio. Complementar renta con ${fmtCLP(rentaExtra)} adicionales (cotitular o codeudor).` });
    }

    if (pieCLP < pieNecesario * 0.9) {
      const falta = Math.ceil((pieNecesario - pieCLP) / 1000) * 1000;
      const bonoAyuda = bonoPct > 0 && presupuesto_bono > presupuesto;
      if (bonoAyuda) {
        alertas.push({ tipo: "yellow", titulo: "Pie insuficiente (bono activo)", msg: `Sin bono faltan ${fmtCLP(falta)}. Con bono pie del ${(bonoPct*100).toFixed(0)}% el presupuesto sube a ${fmtUF(presupuesto_bono)} — las unidades marcadas 🎁 son accesibles con ese beneficio.` });
      } else {
        alertas.push({ tipo: "yellow", titulo: "Pie insuficiente", msg: `Para acceder al presupuesto calculado se necesitan ${fmtCLP(falta)} adicionales de ahorro.` });
      }
    }

    if (deudas === "si") {
      alertas.push({ tipo: "yellow", titulo: "Deudas activas detectadas", msg: "Las deudas activas reducen la capacidad hipotecaria. Validar con el banco el impacto real en la cuota máxima." });
    }

    if (alertas.filter(a => a.tipo === "yellow").length === 0) {
      alertas.push({ tipo: "green", titulo: "Prospecto apto", msg: `Capacidad financiera confirmada para propiedades hasta ${fmtUF(presupuesto)}.` });
    }
  }

  // ── Filtrar stock ──
  let unidades = stockData.filter(u => {
    if (u.valorLista <= 0) return false;
    if (proyFilt && u.proyecto !== proyFilt) return false;
    if (dormFilt !== "" && String(u.dormitorios) !== dormFilt) return false;
    if (tipoFilt && u.tipo !== tipoFilt) return false;
    const sinBono = u.valorLista <= presupuesto;
    const conBono = presupuesto_bono > 0 && u.valorLista <= presupuesto_bono;
    return sinBono || conBono;
  });

  // ── Construir HTML ──
  let html = "";

  // Cards financieras
  html += `<div class="finance-cards">
    <div class="f-card">
      <div class="f-label">Dividendo máximo</div>
      <div class="f-value">${fmtCLP(divMaxCLP)}</div>
      <div class="f-sub">${fmtUF(divMaxUF)} / mes</div>
    </div>
    <div class="f-card">
      <div class="f-label">Capacidad por ingreso</div>
      <div class="f-value">${fmtUF(propMaxByIngreso)}</div>
      <div class="f-sub">${fmtCLP(propMaxByIngreso * ufVal)}</div>
    </div>
    <div class="f-card">
      <div class="f-label">Capacidad por pie</div>
      <div class="f-value">${fmtUF(propMaxByPie)}</div>
      <div class="f-sub">pie 20% mínimo</div>
    </div>
    <div class="f-card" style="border-color: rgba(201,169,110,0.4)">
      <div class="f-label">Presupuesto efectivo</div>
      <div class="f-value" style="font-size:17px">${fmtUF(presupuesto)}</div>
      <div class="f-sub">${fmtCLP(presupuesto * ufVal)}</div>
    </div>
    ${bonoPct > 0 ? `
    <div class="f-card" style="border-color: rgba(232,184,75,0.4); grid-column: 1 / -1">
      <div class="f-label" style="color:var(--yellow)">🎁 Con bono pie ${(bonoPct*100).toFixed(0)}% — LTV efectivo ${((ltv+bonoPct)*100).toFixed(0)}%</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:6px">
        <div>
          <div style="font-size:11px;color:var(--text3)">Capacidad por ingreso</div>
          <div class="f-value" style="color:var(--yellow)">${fmtUF(propMaxByIngreso_bono)}</div>
          <div class="f-sub">dividendo mayor</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3)">Capacidad por pie</div>
          <div class="f-value" style="color:var(--yellow)">${fmtUF(propMaxByPie_bono)}</div>
          <div class="f-sub">pie ${((1-ltv-bonoPct)*100).toFixed(0)}% requerido</div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text3)">Presupuesto con bono</div>
          <div class="f-value" style="font-size:17px;color:var(--yellow)">${fmtUF(presupuesto_bono)}</div>
          <div class="f-sub">${fmtCLP(presupuesto_bono * ufVal)}</div>
        </div>
      </div>
    </div>` : ""}
  </div>`;

  // Alertas
  if (alertas.length > 0) {
    html += `<div class="alerts">`;
    alertas.forEach(a => {
      const icon = a.tipo === "red" ? "🚫" : a.tipo === "yellow" ? "⚠️" : "✅";
      html += `<div class="alert ${a.tipo}">
        <span class="alert-icon">${icon}</span>
        <div><strong>${a.titulo}</strong>${a.msg}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (bloqueado) {
    area.innerHTML = html;
    return;
  }

  if (unidades.length === 0) {
    html += `<div class="empty-state" style="height:200px">
      <p>No hay unidades disponibles que cumplan los criterios</p>
    </div>`;
    area.innerHTML = html;
    return;
  }

  // Agrupar por proyecto y tipología
  const grupos = {};
  unidades.forEach(u => {
    const key = u.proyecto;
    if (!grupos[key]) grupos[key] = {};
    const norm = normalizarTipologia(u);
    if (!grupos[key][norm]) grupos[key][norm] = [];
    grupos[key][norm].push(u);
  });

  const coloresTipo = {
    "ESTUDIO": "#534AB7", "1D+1B": "#1D9E75", "2D+1B": "#185FA5",
    "2D+2B": "#B07500", "3D+1B": "#993C1D", "3D+2B": "#7a3a99"
  };

  html += `<div class="results-header">
    <h3>Proyectos compatibles</h3>
    <span class="results-count">${unidades.length} unidades · ${Object.keys(grupos).length} proyectos</span>
  </div>`;

  let pIdx = 0;
  Object.entries(grupos).sort((a,b) => a[0].localeCompare(b[0])).forEach(([proy, tipos]) => {
    const total = Object.values(tipos).reduce((s, arr) => s + arr.length, 0);
    const tiposKeys = Object.keys(tipos).sort();
    html += `<div class="proyecto-group">
      <div class="proyecto-header" onclick="toggleProy('pg${pIdx}')">
        <div>
          <div class="proyecto-name">${proy}</div>
          <div class="proyecto-meta">${tiposKeys.join(" · ")}</div>
        </div>
        <div class="proyecto-right">
          <span class="proyecto-count">${total} unid.</span>
          <span class="chevron" id="chev-pg${pIdx}">▼</span>
        </div>
      </div>
      <div class="proyecto-body" id="pg${pIdx}">`;

    let tIdx = 0;
    tiposKeys.forEach(tipo => {
      const unids = tipos[tipo];
      const precios = unids.map(u => u.valorLista);
      const min = Math.min(...precios);
      const max = Math.max(...precios);
      const minDesc = Math.min(...unids.map(u => u.valorDesc || u.valorLista));
      const color = coloresTipo[tipo] || "#666";
      const tableId = `tbl-${pIdx}-${tIdx}`;

      html += `<div class="tipo-row" onclick="toggleTabla('${tableId}', this)">
        <span class="tipo-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${tipo}</span>
        <div class="tipo-info">
          <div class="tipo-precio">${min === max ? fmtUF(min) : fmtUF(min) + " – " + fmtUF(max)}</div>
          ${minDesc < min ? `<div class="tipo-precio-sub">c/desc. desde ${fmtUF(minDesc)}</div>` : ""}
        </div>
        <div class="tipo-count">${unids.length} unid.<br><span style="font-size:10px;color:#444">ver detalle</span></div>
      </div>
      <div class="unidades-table" id="${tableId}">
        <table>
          <thead>
            <tr>
              <th>N° Bien</th><th>Piso</th><th>Orientación</th>
              <th>Sup. útil</th><th>Valor lista</th><th>Con desc.</th>
              <th>Bienes conj.</th>
            </tr>
          </thead>
          <tbody>`;

      unids.sort((a,b) => a.valorLista - b.valorLista).forEach(u => {
        const hasDesc = u.valorDesc && u.valorDesc < u.valorLista;
        const necesitaBono = bonoPct > 0 && u.valorLista > presupuesto && u.valorLista <= presupuesto_bono;
        html += `<tr>
          <td class="td-desc">${u.nBien}${necesitaBono ? ' <span class="bono-tag">🎁 bono</span>' : ''}</td>
          <td>${u.piso || "–"}</td>
          <td>${u.orientacion || "–"}</td>
          <td class="td-mono">${u.supUtil ? u.supUtil.toFixed(1) + " m²" : "–"}</td>
          <td class="td-mono">${fmtUF(u.valorLista)}</td>
          <td class="td-mono" style="${hasDesc ? "color:var(--green)" : "color:var(--text3)"}">${hasDesc ? fmtUF(u.valorDesc) : "–"}</td>
          <td style="font-size:11px;color:var(--text3)">${u.bienesConj || "–"}</td>
        </tr>`;
      });

      html += `</tbody></table></div>`;
      tIdx++;
    });

    html += `</div></div>`;
    pIdx++;
  });

  area.innerHTML = html;
}

// ─── UTILS ────────────────────────────────────────────────────
function normalizarTipologia(u) {
  const tp = (u.tipologia || "").toUpperCase().trim();
  if (tp.includes("ESTUDIO")) return "ESTUDIO";
  if (tp.includes("3D") && tp.includes("2B")) return "3D+2B";
  if (tp.includes("3D")) return "3D+1B";
  if (tp.includes("2D") && tp.includes("2B")) return "2D+2B";
  if (tp.includes("2D")) return "2D+1B";
  if (tp.includes("1D")) return "1D+1B";
  const d = parseInt(u.dormitorios);
  if (d === 0) return "ESTUDIO";
  if (d === 1) return "1D+1B";
  if (d === 2) return "2D+1B";
  if (d === 3) return "3D+1B";
  return tp || "OTRO";
}

function toggleProy(id) {
  const body = document.getElementById(id);
  const chev = document.getElementById("chev-" + id);
  body.classList.toggle("open");
  chev.classList.toggle("open");
}

function toggleTabla(id, row) {
  const tbl = document.getElementById(id);
  tbl.classList.toggle("open");
}
</script>
